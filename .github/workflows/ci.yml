name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
      - feat/**
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  ci:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd backend
          npm install

      - name: Run Lint
        run: |
          cd backend
          npm run lint || echo "WARNING: No lint script found"

      - name: Run Tests
        run: |
          cd backend
          npm test || echo "WARNING: No test script found"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=devops-teams-devops-project
            -Dsonar.organization=devops-teams
            -Dsonar.sources=backend
            -Dsonar.verbose=true

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Backend Docker image
        run: |
          cd backend
          docker build -t hushfire/diary-backend:latest .
          docker tag hushfire/diary-backend:latest hushfire/diary-backend:${{ github.sha }}

      - name: Build Frontend Docker image
        run: |
          cd frontend
          docker build -t hushfire/diary-frontend:latest .

      - name: Scan Backend Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hushfire/diary-backend:latest
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true

      - name: Push Docker images to Docker Hub
        run: |
          docker push hushfire/diary-backend:latest
          docker push hushfire/diary-backend:${{ github.sha }}
          docker push hushfire/diary-frontend:latest