name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
      - feat/**
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  ci:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd backend
          npm install

      - name: Run Lint
        run: |
          cd backend
          npm run lint || echo "WARNING: No lint script found"

      - name: Run Tests
        run: |
          cd backend
          npm test || echo "WARNING: No test script found"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=devops-teams-devops-project
            -Dsonar.organization=devops-teams
            -Dsonar.sources=backend
            -Dsonar.verbose=true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io

      - name: Build Docker image
        run: |
          docker build -t gcr.io/diary-devops-494522/diary-backend:latest ./backend
          docker tag gcr.io/diary-devops-494522/diary-backend:latest gcr.io/diary-devops-494522/diary-backend:${{ github.sha }}

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: gcr.io/diary-devops-494522/diary-backend:latest
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true

      - name: Push Docker image to GCR
        run: |
          docker push gcr.io/diary-devops-494522/diary-backend:latest
          docker push gcr.io/diary-devops-494522/diary-backend:${{ github.sha }}