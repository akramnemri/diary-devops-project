name: CI Pipeline

on:
  push:
    branches:
      - dev
      - feat/**

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd backend
          npm install

      - name: Run basic check
        run: |
          cd backend
          node -e "console.log('Basic check passed')"

      - name: Build Docker image
        run: |
          cd backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/diary-backend .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Scan Docker image with Trivy
          uses: aquasecurity/trivy-action@master
          with:
            image-ref: ${{ secrets.DOCKER_USERNAME }}/diary-backend
            format: 'table'
            exit-code: '1'
            severity: 'CRITICAL,HIGH'
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/diary-backend
